# zgui-arctic-light — "Arctic" light variant
# Generated from zgui-core/webui/colorscheme.js → COLOR_SCHEMES.arctic.lightVars.
# Inherits the dark scope mapping; only the [palette] neutrals/accents flip to light.

inherits = "zgui-arctic"

[palette]
accent = "#0284c7"
accent_light = "#0ea5e9"
cyan = "#0891b2"
magenta = "#0e7490"
green = "#0d9488"
yellow = "#155e75"
orange = "#06b6d4"
red = "#e11d48"
text = "#164e63"
text_dim = "#0e7490"
text_muted = "#a5f3fc"
bg = "#ecfeff"
bg2 = "#cffafe"
bg_card = "#ffffff"
bg_hover = "#ecfeff"
border = "#a5f3fc"
border_glow = "#67e8f9"
