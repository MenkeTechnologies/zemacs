# zgui-midnight-light — "Midnight" light variant
# Generated from zgui-core/webui/colorscheme.js → COLOR_SCHEMES.midnight.lightVars.
# Inherits the dark scope mapping; only the [palette] neutrals/accents flip to light.

inherits = "zgui-midnight"

[palette]
accent = "#6d28d9"
accent_light = "#8b5cf6"
cyan = "#0284c7"
magenta = "#4f46e5"
green = "#059669"
yellow = "#7c3aed"
orange = "#6366f1"
red = "#e11d48"
text = "#1e1b4b"
text_dim = "#4338ca"
text_muted = "#a5b4fc"
bg = "#eef2ff"
bg2 = "#e0e7ff"
bg_card = "#ffffff"
bg_hover = "#f5f3ff"
border = "#c7d2fe"
border_glow = "#a5b4fc"
