orange = "#d97757"
red = "#e11d48"
text = "#2a1e3a"
text_dim = "#5a4a72"
text_muted = "#9a8ab0"
bg = "#f7f0fb"
bg2 = "#ede2f5"
bg_card = "#ffffff"
bg_hover = "#faf4fd"
border = "#ddc9ec"
border_glow = "#c4a8db"
